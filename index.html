<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>

<title>SMK Mentakab</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --blue:#2f80ff;
  --blue2:#1d6eea;
  --bg:#eef5ff;
  --card:#ffffff;
  --text:#0d1b34;
  --sub:#6c87ab;
}

/* RESET */
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:"Inter",sans-serif;
  background:linear-gradient(180deg,#eef5ff,#dfeaff);
}

/* APP */
#appRoot{
  max-width:480px;
  margin:auto;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* HEADER */
.app-header{
  padding:18px;
  color:#fff;
  background:linear-gradient(135deg,#0a1633,#1d6eea);
}

.ah-title{
  font-weight:800;
  font-size:15px;
}

.ah-sub{
  font-size:12px;
  opacity:.85;
}

/* WEEK NAV */
.week-nav{
  display:flex;
  gap:10px;
  padding:12px;
}

.wn-btn{
  flex:1;
  background:#fff;
  padding:12px;
  border-radius:16px;
  text-align:center;
  font-weight:600;
  box-shadow:0 4px 10px rgba(0,0,0,.05);
}

/* STAFF LIST */
.staff-list{
  padding:12px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

/* CARD */
.staff-card{
  background:var(--card);
  border-radius:18px;
  padding:14px;
  box-shadow:0 8px 22px rgba(0,0,0,.08);
  transition:.2s;
}

.staff-card:hover{
  transform:translateY(-2px);
}

/* FLEX */
.sc-top{
  display:flex;
  gap:12px;
  align-items:flex-start;
}

/* AVATAR */
.sc-avatar{
  width:46px;
  height:46px;
  min-width:46px;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-weight:800;
  background:linear-gradient(135deg,var(--blue),#6ea8ff);
}

/* INFO */
.sc-info{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:6px;
}

/* NAME */
.sc-name-text{
  font-size:14px;
  font-weight:800;
  color:var(--text);

  white-space:normal;
  word-break:break-word;
  overflow-wrap:anywhere;
}

/* ROLE */
.sc-role{
  font-size:11px;
  background:#eef5ff;
  padding:5px 10px;
  border-radius:999px;
  width:fit-content;
  color:#29538b;
}

/* STATUS */
.sc-status{
  font-size:11px;
  font-weight:700;
  color:#ff6b6b;
}

/* BUTTON */
.sc-btn{
  margin-top:10px;
  padding:11px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,var(--blue),var(--blue2));
  color:#fff;
  font-weight:700;
  cursor:pointer;
}

/* 🔥 PRO FONT NUMBER */
.number{
  font-family:"Space Grotesk",sans-serif;
  font-weight:700;
  letter-spacing:0.5px;
}

/* MOBILE */
@media(max-width:420px){
  .sc-name-text{
    font-size:13px;
  }
}
</style>
</head>

<body>

<div id="appRoot">

<!-- HEADER -->
<div class="app-header">
  <div class="ah-title">SEKOLAH MENENGAH KEBANGSAAN MENTAKAB</div>
  <div class="ah-sub">Senarai Penghantaran Tugasan Harian</div>
</div>

<!-- WEEK -->
<div class="week-nav">
  <div class="wn-btn">← Minggu Lalu</div>
  <div class="wn-btn number">Minggu 13</div>
  <div class="wn-btn">Minggu Depan →</div>
</div>

<!-- STAFF -->
<div class="staff-list" id="staffList"></div>

</div>

<script>
const STAFF = [
  "'Afifah Binti Abdul Aziz",
  "Ida Zarina Binti Idris",
  "Azian Binti Mohamad",
  "Fatimah Binti Abdul Latiff",
  "Zainun Binti Mohamed Ramthan",
  "Nor'aini Binti Md Yusoff",
  "Fakarullah Amer Bin Zainal Abidin",
  "Abdul Azam Bin Mohamed",
  "Nor Faiza Binti Mustaffa Kamal",
  "Wan Azlena Binti Wan Deraman",
  "Mohd Faizal Bin Zainal",
  "Juhaida Binti Abd Rasid",
  "Junainah Binti Hassan",
  "Rafidah Binti Ramli",
  "Muhammad Fahmi Bin Hamidin",
  "Nursyaza Aina Binti Mohd Adaha"
];

function render(){
  const el = document.getElementById("staffList");

  el.innerHTML = STAFF.map((name,i)=>`
    <div class="staff-card">
      <div class="sc-top">
        <div class="sc-avatar">${name.charAt(0)}</div>
        <div class="sc-info">
          <div class="sc-name-text">${name}</div>
          <div class="sc-role">Pembantu</div>
          <div class="sc-status">Belum Hantar</div>
        </div>
      </div>
      <button class="sc-btn">Muat Naik Tugasan</button>
    </div>
  `).join("");
}

render();
</script>

</body>
</html>
