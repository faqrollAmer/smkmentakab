<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Sistem Penghantaran Tugasan – SMK Mentakab</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --blue:#2f80ff;
  --bg:#eef5ff;
  --card:#ffffff;
  --text:#0d1b34;
  --sub:#6c87ab;
}

/* RESET */
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:"Plus Jakarta Sans",sans-serif;
  background:linear-gradient(180deg,#eef5ff,#dfeaff);
}

/* APP */
#appRoot{
  max-width:480px;
  margin:auto;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* HEADER */
.app-header{
  padding:16px;
  color:#fff;
  background:linear-gradient(135deg,#0a1633,#1d6eea);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.ah-title{
  font-family:"Syne";
  font-weight:800;
  font-size:14px;
}

.ah-sub{
  font-size:11px;
  opacity:.8;
}

/* WEEK NAV */
.week-nav{
  display:flex;
  gap:8px;
  padding:12px;
}

.wn-btn{
  flex:1;
  background:#fff;
  padding:12px;
  border-radius:14px;
  text-align:center;
  font-weight:700;
}

/* STAFF LIST */
.staff-list{
  padding:12px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* CARD */
.staff-card{
  background:var(--card);
  border-radius:18px;
  padding:14px;
  box-shadow:0 6px 18px rgba(0,0,0,.08);
}

/* FLEX FIX */
.sc-top{
  display:flex;
  gap:12px;
  align-items:flex-start;
}

.sc-avatar{
  width:44px;
  height:44px;
  min-width:44px;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-weight:800;
  background:var(--blue);
}

.sc-info{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:6px;
}

/* FIX NAMA */
.sc-name-text{
  font-size:14px;
  font-weight:800;
  color:var(--text);

  /* CRITICAL FIX */
  white-space:normal;
  word-break:break-word;
  overflow-wrap:anywhere;
}

/* ROLE */
.sc-role{
  font-size:11px;
  background:#eef5ff;
  padding:5px 10px;
  border-radius:999px;
  width:fit-content;
  color:#29538b;
}

/* STATUS */
.sc-status{
  font-size:11px;
  margin-top:4px;
  font-weight:700;
}

/* BUTTON */
.sc-btn{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:12px;
  background:var(--blue);
  color:#fff;
  font-weight:800;
  cursor:pointer;
}

/* MOBILE SAFE */
@media(max-width:420px){
  .sc-name-text{
    font-size:13px;
  }
}
</style>
</head>

<body>

<div id="appRoot">

<!-- HEADER -->
<div class="app-header">
  <div>
    <div class="ah-title">SEKOLAH MENENGAH KEBANGSAAN MENTAKAB</div>
    <div class="ah-sub">Senarai Penghantaran Tugasan Harian</div>
  </div>
  <i class="fa-solid fa-bell"></i>
</div>

<!-- WEEK -->
<div class="week-nav">
  <div class="wn-btn">← Minggu Lalu</div>
  <div class="wn-btn">Minggu 13</div>
  <div class="wn-btn">Minggu Depan →</div>
</div>

<!-- STAFF -->
<div class="staff-list" id="staffList"></div>

</div>

<script>
const STAFF = [
  "'Afifah Binti Abdul Aziz",
  "Ida Zarina Binti Idris",
  "Azian Binti Mohamad",
  "Fatimah Binti Abdul Latiff",
  "Zainun Binti Mohamed Ramthan",
  "Nor'aini Binti Md Yusoff",
  "Fakarullah Amer Bin Zainal Abidin",
  "Abdul Azam Bin Mohamed",
  "Nor Faiza Binti Mustaffa Kamal",
  "Wan Azlena Binti Wan Deraman",
  "Mohd Faizal Bin Zainal",
  "Juhaida Binti Abd Rasid",
  "Junainah Binti Hassan",
  "Rafidah Binti Ramli",
  "Muhammad Fahmi Bin Hamidin",
  "Nursyaza Aina Binti Mohd Adaha"
];

function render(){
  const el = document.getElementById("staffList");

  el.innerHTML = STAFF.map((name,i)=>`
    <div class="staff-card">
      <div class="sc-top">
        <div class="sc-avatar">${name.charAt(0)}</div>
        <div class="sc-info">
          <div class="sc-name-text">${name}</div>
          <div class="sc-role">Pembantu</div>
          <div class="sc-status">Belum Hantar</div>
        </div>
      </div>
      <button class="sc-btn">Muat Naik</button>
    </div>
  `).join("");
}

render();
</script>

</body>
</html>
