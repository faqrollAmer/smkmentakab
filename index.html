<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SMK Mentakab PRO MAX</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --blue:#0b5cff;
  --bg:#f4f7fb;
}

body{
  margin:0;
  font-family:'Plus Jakarta Sans',sans-serif;
  background:var(--bg);
}

/* HERO */
.hero{
  background:linear-gradient(135deg,#0b1c3a,#1a4fff);
  color:#fff;
  padding:24px;
  border-radius:0 0 24px 24px;
}

.hero h1{
  font-family:'Playfair Display',serif;
  font-size:22px;
  margin:0;
}

.hero small{
  opacity:.8;
}

/* WEEK NAV */
.week{
  display:flex;
  gap:10px;
  padding:14px;
}

.week div{
  flex:1;
  background:#fff;
  border-radius:12px;
  padding:12px;
  text-align:center;
  font-weight:600;
}

/* TABS */
.tabs{
  display:flex;
  gap:14px;
  padding:0 14px;
  border-bottom:1px solid #ddd;
}

.tab{
  padding:10px 0;
  cursor:pointer;
  color:#7a8ca5;
}

.tab.active{
  color:var(--blue);
  border-bottom:3px solid var(--blue);
}

/* CARD */
.card{
  background:#fff;
  margin:12px;
  padding:16px;
  border-radius:16px;
  box-shadow:0 6px 20px rgba(0,0,0,.05);
  animation:fade .4s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1}
}

.name{
  font-weight:700;
}

.role{
  font-size:12px;
  color:#7b8ba5;
}

.badge{
  background:#fff4cc;
  color:#a97700;
  padding:5px 10px;
  border-radius:999px;
  font-size:11px;
  float:right;
}

.btn{
  margin-top:12px;
  background:var(--blue);
  color:#fff;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

/* CHART */
.chart{
  background:#fff;
  margin:12px;
  padding:16px;
  border-radius:16px;
}

/* NOTIF */
.notif{
  position:fixed;
  top:10px;
  right:10px;
  background:#fff;
  padding:10px 14px;
  border-radius:10px;
  box-shadow:0 10px 20px rgba(0,0,0,.1);
  display:none;
}

</style>
</head>

<body>

<div class="hero">
  <h1>SMK Mentakab</h1>
  <small>Senarai Penghantaran Tugasan</small>
</div>

<div class="week">
  <div onclick="prevWeek()">← Minggu Lalu</div>
  <div id="weekText">Minggu 13</div>
  <div onclick="nextWeek()">Minggu Depan →</div>
</div>

<div class="tabs">
  <div class="tab active">Semua</div>
  <div class="tab">Makmal</div>
  <div class="tab">PPM</div>
  <div class="tab">PT</div>
  <div class="tab">PKA</div>
</div>

<div id="list"></div>

<div class="chart">
  <canvas id="chart"></canvas>
</div>

<div id="notif" class="notif"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBzq9oIDQPX4OKykAxhceSTkovWWI7BNjM",
  authDomain: "smkmentakab-d70cc.firebaseapp.com",
  projectId: "smkmentakab-d70cc",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const STAFF = [
 "Afifah","Ida Zarina","Azian","Fatimah"
];

function render(){
  const el = document.getElementById("list");
  el.innerHTML = STAFF.map(n=>`
    <div class="card">
      <div class="name">${n}</div>
      <div class="role">Pembantu Makmal</div>
      <div class="badge">BELUM HANTAR</div>
      <div class="btn">Muat Naik</div>
    </div>
  `).join('');
}

render();

/* CHART */
new Chart(document.getElementById('chart'),{
  type:'doughnut',
  data:{
    labels:['Disahkan','Belum','Lewat'],
    datasets:[{
      data:[5,8,3]
    }]
  }
});

/* REALTIME NOTIF */
onSnapshot(collection(db,"logs"),snap=>{
  showNotif("Update terbaru!");
});

function showNotif(txt){
  const n=document.getElementById("notif");
  n.innerText=txt;
  n.style.display="block";
  setTimeout(()=>n.style.display="none",2000);
}

</script>

</body>
</html>
