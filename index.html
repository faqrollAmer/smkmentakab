<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>SMK Mentakab PRO MAX v4</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:"Inter";
  background:#eef5ff;
}

.header{
  padding:20px;
  color:#fff;
  background:linear-gradient(135deg,#0a1633,#1d6eea);
}

.title{font-weight:800}
.sub{font-size:12px;opacity:.8}

.staff-list{
  padding:12px;
}

.card{
  background:#fff;
  border-radius:16px;
  padding:14px;
  margin-bottom:10px;
  box-shadow:0 6px 16px rgba(0,0,0,.08);
}

.name{
  font-weight:800;
  word-break:break-word;
}

.role{
  font-size:11px;
  background:#eef5ff;
  padding:4px 8px;
  border-radius:999px;
  display:inline-block;
}

.status{
  font-size:11px;
  font-weight:700;
  margin-top:4px;
}

.btn{
  margin-top:10px;
  padding:10px;
  width:100%;
  border:none;
  border-radius:10px;
  background:#2f80ff;
  color:#fff;
}

.chart{
  height:200px;
}
</style>
</head>

<body>

<div class="header">
  <div class="title">SMK Mentakab</div>
  <div class="sub">Sistem Penghantaran Tugasan</div>
</div>

<div class="staff-list" id="list"></div>

<canvas id="chart" class="chart"></canvas>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js";

/* 🔥 PASTE FIREBASE CONFIG SINI */
const firebaseConfig = {
  apiKey: "PASTE",
  authDomain: "PASTE",
  projectId: "PASTE",
  storageBucket: "PASTE",
  messagingSenderId: "PASTE",
  appId: "PASTE"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const storage = getStorage(app);

await signInAnonymously(auth);

/* STAFF */
const STAFF = [
  "Afifah","Ida","Azian","Fatimah",
  "Zainun","Noraini","Fakarullah","Azam",
  "Faiza","Azlena","Faizal",
  "Juhaida","Junainah","Rafidah",
  "Fahmi","Syaza"
];

let records = {};

onSnapshot(collection(db,"records"),snap=>{
  records = {};
  snap.forEach(d=>records[d.id]=d.data());
  render();
});

/* RENDER */
function render(){
  const el = document.getElementById("list");

  let ok=0,late=0,pending=0;

  el.innerHTML = STAFF.map(name=>{
    const rec = records[name] || {};
    let status="Belum Hantar";

    if(rec.file) status="Menunggu";
    if(rec.confirmed) status="Disahkan";

    if(status==="Disahkan") ok++;
    else if(status==="Menunggu") pending++;
    else late++;

    return `
    <div class="card">
      <div class="name">${name}</div>
      <div class="role">Staff</div>
      <div class="status">${status}</div>
      <input type="file" onchange="upload(event,'${name}')">
      <button class="btn" onclick="confirm('${name}')">Sahkan</button>
    </div>`;
  }).join("");

  drawChart(ok,pending,late);
}

/* UPLOAD */
window.upload = async (e,name)=>{
  const file = e.target.files[0];
  const r = ref(storage,"files/"+name+Date.now());
  await uploadBytes(r,file);
  const url = await getDownloadURL(r);

  await setDoc(doc(db,"records",name),{
    file:url,
    confirmed:false
  });

  alert("Upload berjaya");
};

/* CONFIRM */
window.confirm = async (name)=>{
  await setDoc(doc(db,"records",name),{
    confirmed:true
  },{merge:true});
};

/* CHART */
function drawChart(ok,pending,late){
  new Chart(document.getElementById("chart"),{
    type:"doughnut",
    data:{
      labels:["Disahkan","Menunggu","Belum"],
      datasets:[{
        data:[ok,pending,late]
      }]
    }
  });
}
</script>

</body>
</html>
