<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Sistem Penghantaran Tugasan – SMK Mentakab</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ================= ROOT ================= */
:root{
  --bg:#eef3ff;
  --card:#ffffff;
  --blue:#4f6cff;
  --blue2:#6c63ff;
  --text:#0f172a;
  --sub:#64748b;
  --border:#e2e8f0;
}

/* ================= BASE ================= */
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Plus Jakarta Sans',sans-serif;
  background:linear-gradient(135deg,#0f172a,#1e3a8a);
  display:flex;
  justify-content:center;
}

#app{
  width:100%;
  max-width:480px;
  background:var(--bg);
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* ================= HEADER ================= */
.header{
  background:linear-gradient(135deg,#4f6cff,#6c63ff);
  color:#fff;
  padding:16px;
  font-family:'Syne';
  font-weight:800;
}

/* ================= LIST ================= */
.list{
  flex:1;
  overflow:auto;
  padding:12px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

/* ================= CARD ================= */
.card{
  background:var(--card);
  border-radius:16px;
  padding:14px;
  box-shadow:0 6px 20px rgba(0,0,0,0.08);
  transition:.2s;
}
.card:hover{transform:translateY(-3px)}

.row{
  display:flex;
  gap:10px;
}

/* ================= AVATAR ================= */
.avatar{
  width:42px;
  height:42px;
  border-radius:12px;
  background:linear-gradient(135deg,#4f6cff,#6c63ff);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
}

/* ================= NAME (PRO MAX FIX) ================= */
.name{
  overflow:hidden;
  position:relative;
}

/* gradient fade */
.name::before,
.name::after{
  content:'';
  position:absolute;
  top:0;
  bottom:0;
  width:30px;
  z-index:2;
}
.name::before{
  left:0;
  background:linear-gradient(to right,var(--card),transparent);
}
.name::after{
  right:0;
  background:linear-gradient(to left,var(--card),transparent);
}

/* track */
.name-track{
  display:flex;
  gap:40px;
  width:max-content;
  animation:scrollName 18s linear infinite;
}

/* text */
.name-text{
  font-weight:700;
  color:var(--text);
  white-space:nowrap;
}

/* animation */
@keyframes scrollName{
  0%{transform:translateX(0)}
  100%{transform:translateX(-50%)}
}

/* pause on hover */
.name:hover .name-track{
  animation-play-state:paused;
}

/* ================= ROLE ================= */
.role{
  font-size:12px;
  color:var(--sub);
  margin-top:4px;
}

/* ================= BUTTON ================= */
.btn{
  margin-top:10px;
  background:linear-gradient(135deg,#4f6cff,#6c63ff);
  color:#fff;
  padding:10px;
  border-radius:10px;
  border:none;
  font-weight:700;
  width:100%;
  cursor:pointer;
}

/* ================= MOBILE SAFE ================= */
@media (max-width:420px){
  .name-track{
    animation-duration:22s;
  }
}

</style>
</head>

<body>

<div id="app">

<div class="header">
SMK Mentakab Dashboard
</div>

<div class="list" id="list"></div>

</div>

<script>

/* ================= DATA ================= */
const STAFF = [
"Afifah Binti Abdul Aziz",
"Ida Zarina Binti Idris",
"Azian Binti Mohamad",
"Fatimah Binti Abdul Latiff",
"Zainun Binti Mohamed Ramthan",
"Noraini Binti Md Yusoff",
"Fakarullah Amer Bin Zainal Abidin",
"Abdul Azam Bin Mohamed"
];

/* ================= RENDER ================= */
function render(){
  const list=document.getElementById("list");

  list.innerHTML = STAFF.map(name=>{

    const short=name.replace(/^'/,'');

    return `
    <div class="card">
      <div class="row">

        <div class="avatar">${short[0]}</div>

        <div style="flex:1">

          <div class="name">
            <div class="name-track">
              <div class="name-text">${short}</div>
              <div class="name-text">${short}</div>
            </div>
          </div>

          <div class="role">Pembantu Makmal</div>

          <button class="btn">Upload Tugasan</button>

        </div>

      </div>
    </div>
    `;
  }).join('');
}

render();

</script>

</body>
</html>
